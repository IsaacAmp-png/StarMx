<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Space Combatters: Defensa MX</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; /* Evita que salgan barras de scroll */
      font-family: 'Courier New', Courier, monospace; 
      background-color: #000;
    }
    
    /* ==========================================================
    // MENÚ DE INICIO
    // ========================================================== */
    #menuInicio {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 20, 10, 0.85); /* Fondo verde oscuro semitransparente */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 10;
    }
    
    h1 {
      font-size: 4rem;
      color: #00ff00; 
      text-shadow: 4px 4px 0px #000;
      margin-bottom: 0;
      text-align: center;
    }

    h2 {
      color: #ffffff;
      margin-bottom: 40px;
      text-align: center;
    }
    
    .boton {
      margin: 10px;
      padding: 15px 50px;
      font-size: 1.5rem;
      font-family: inherit;
      background-color: #d9261c; /* Rojo México */
      color: white;
      border: 4px solid white;
      cursor: pointer;
      text-transform: uppercase;
      font-weight: bold;
    }
    
    .boton:hover {
      background-color: #006847; /* Verde México */
    }

    /* Contador de derribos en la esquina */
    #marcador {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00ff00;
      font-size: 1.5rem;
      z-index: 5;
      display: none; /* Oculto hasta que empiece el juego */
      text-shadow: 2px 2px 0px #000;
    }
  </style>
</head>
<body>

  <div id="marcador">Enemigos Derribados: <span id="puntosTxt">0</span></div>

  <div id="menuInicio">
    <h1>SPACE COMBATTERS</h1>
    <h2>Operación: Defensa de México</h2>
    <button class="boton" id="btnPlay">Play</button>
    <button class="boton" id="btnSalir">Salir</button>
  </div>
  
  <!-- Llamamos a nuestro script principal como módulo -->
  <script src="main.js" type="module"></script>
</body>
</html>
