<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Combatters: Defensa MX</title>
  <style>
    /* ==========================================================
       EFECTO DE MONITOR CRT (Líneas de escaneo análogas)
       ========================================================== */
    body::before {
      content: " ";
      display: block;
      position: absolute;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 100;
      background-size: 100% 2px, 3px 100%;
      pointer-events: none; /* Deja pasar los clics */
    }

    body { 
      margin: 0; overflow: hidden; font-family: 'Courier New', Courier, monospace; 
      background-color: #000; user-select: none; cursor: none; 
    }
    
    /* PANTALLAS DE MENÚ */
    .pantalla-menu {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 20, 10, 0.9);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; z-index: 20; cursor: default;
    }
    h1 { font-size: 3rem; color: #00ff00; text-shadow: 4px 4px 0px #000; text-align: center; margin-bottom: 0;}
    h2 { color: #ffffff; text-align: center; margin-bottom: 40px; }
    .boton {
      margin: 10px; padding: 15px 40px; font-size: 1.5rem; font-family: inherit;
      background-color: #d9261c; color: white; border: 4px solid white; cursor: pointer; font-weight: bold;
    }
    .boton:hover { background-color: #006847; }
    
    /* HUD */
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; display: none; z-index: 10;
    }
    #hudLeft { position: absolute; top: 20px; left: 20px; }
    #healthBarContainer { width: 150px; height: 20px; border: 3px solid white; background-color: #333; margin-bottom: 5px; }
    #healthBar { width: 100%; height: 100%; background: linear-gradient(to right, #ff4500, #ffd700, #4169e1); transition: width 0.3s ease; }
    #score { font-size: 2.5rem; color: #87ceeb; font-weight: bold; text-shadow: 2px 2px 0px #000; }
    #hudRight { position: absolute; top: 20px; right: 20px; text-align: right; }
    #lives { font-size: 1.5rem; color: white; text-shadow: 2px 2px 0px #000; margin-bottom: 5px; }
    #tiempoUI { font-size: 1.2rem; color: #ffeb3b; text-shadow: 2px 2px 0px #000;}

    /* ELEMENTOS VISUALES DEL JUEGO */
    #crosshair {
      position: fixed; top: 50%; left: 50%; width: 50px; height: 50px;
      border: 3px solid rgba(0, 255, 0, 0.9); transform: translate(-50%, -50%); pointer-events: none;
    }
    #hitMarker {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: red; font-size: 2rem; font-weight: bold; display: none; text-shadow: 2px 2px #000;
    }
    #damageOverlay {
      position: absolute; top:0; left:0; width: 100%; height: 100%;
      background-color: rgba(255, 0, 0, 0.4); display: none; z-index: 5; pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- MENÚ PRINCIPAL -->
  <div id="menuInicio" class="pantalla-menu">
    <h1>SPACE COMBATTERS</h1>
    <h2>Operación: Defensa de México</h2>
    <button class="boton" id="btnPlay">INICIAR MISIÓN</button>
  </div>

  <!-- MENÚ DE GAME OVER -->
  <div id="menuGameOver" class="pantalla-menu" style="display: none; background-color: rgba(30, 0, 0, 0.9);">
    <h1 style="color: red;">M.I.A. (MISSING IN ACTION)</h1>
    <h2 id="puntosFinalesTxt">Puntos obtenidos: 0</h2>
    <button class="boton" id="btnAceptarFin">ACEPTAR</button>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="hudLeft">
      <div id="healthBarContainer"><div id="healthBar"></div></div>
      <div id="score">000</div>
    </div>
    <div id="hudRight">
      <div id="lives" id="vidasTxt">▲ x 3</div>
      <div id="tiempoUI">Tiempo: 0:00</div>
    </div>
    <div id="crosshair"></div>
  </div>
  
  <div id="damageOverlay"></div>
  <div id="hitMarker">¡BLANCO!</div>

  <script src="main.js" type="module"></script>
</body>
</html>
