<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Combatters: Defensa MX</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      font-family: 'Courier New', Courier, monospace; 
      background-color: #000;
      user-select: none;
    }
    
    /* ==========================================================
       MENÚ DE INICIO
       ========================================================== */
    #menuInicio {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-color: rgba(0, 20, 10, 0.9);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      color: white; z-index: 20;
    }
    h1 { font-size: 3rem; color: #00ff00; text-shadow: 4px 4px 0px #000; text-align: center; margin-bottom: 0;}
    h2 { color: #ffffff; text-align: center; margin-bottom: 40px; }
    .boton {
      margin: 10px; padding: 15px 40px; font-size: 1.5rem; font-family: inherit;
      background-color: #d9261c; color: white; border: 4px solid white; cursor: pointer; font-weight: bold;
    }
    
    /* ==========================================================
       HUD (INTERFAZ DEL JUEGO ESTILO N64)
       ========================================================== */
    #hud {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; /* Deja que los clics pasen al juego */
      display: none; z-index: 10;
    }

    /* HUD Superior Izquierdo (Vida y Puntos) */
    #hudLeft { position: absolute; top: 20px; left: 20px; }
    #healthBarContainer { width: 150px; height: 20px; border: 3px solid white; background-color: #333; margin-bottom: 5px; }
    #healthBar { width: 100%; height: 100%; background: linear-gradient(to right, #ff4500, #ffd700, #4169e1); }
    #score { font-size: 2.5rem; color: #87ceeb; font-weight: bold; text-shadow: 2px 2px 0px #000; }

    /* HUD Superior Derecho (Vidas y Bombas) */
    #hudRight { position: absolute; top: 20px; right: 20px; text-align: right; }
    #lives { font-size: 1.5rem; color: white; text-shadow: 2px 2px 0px #000; margin-bottom: 5px; }
    #bombs { font-size: 1.2rem; }

    /* Mirilla (Crosshair) */
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      width: 60px; height: 60px;
      border: 3px solid rgba(0, 255, 0, 0.7);
      transform: translate(-50%, -50%);
    }
    
    /* Botón de Disparo (Para móviles o ratón) */
    #btnDisparar {
      position: absolute; bottom: 30px; right: 30px;
      width: 100px; height: 100px; border-radius: 50%;
      background-color: rgba(255, 0, 0, 0.5);
      border: 4px solid rgba(255, 255, 255, 0.5);
      color: white; font-weight: bold; font-family: inherit;
      pointer-events: auto; /* Este sí recibe clics */
      display: none; z-index: 15;
    }
    #btnDisparar:active { background-color: rgba(255, 0, 0, 0.9); }

    /* Texto temporal de "Hit!" */
    #hitMarker {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: red; font-size: 2rem; font-weight: bold;
      display: none;
    }
  </style>
</head>
<body>

  <div id="menuInicio">
    <h1>SPACE COMBATTERS</h1>
    <h2>Operación: Defensa de México</h2>
    <button class="boton" id="btnPlay">INICIAR MISIÓN</button>
  </div>

  <!-- HUD del juego -->
  <div id="hud">
    <div id="hudLeft">
      <div id="healthBarContainer"><div id="healthBar"></div></div>
      <div id="score">000</div>
    </div>
    <div id="hudRight">
      <div id="lives">▲ x 2</div>
      <div id="bombs">🔴 🔴 🔴</div>
    </div>
    <div id="crosshair"></div>
  </div>
  
  <div id="hitMarker">¡BLANCO!</div>
  
  <button id="btnDisparar">FUEGO</button>

  <script src="main.js" type="module"></script>
</body>
</html>
